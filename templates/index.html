<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Classifier</title>
</head>
<body>

    <h1>Email Spam Classifier</h1>

    <form method="POST">
        <textarea name="message"
                  rows="10"
                  cols="50"
                  placeholder="Enter your message"></textarea>
        <br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Result: {{ prediction }}</h2>
    {% endif %}

</body>
</html>
